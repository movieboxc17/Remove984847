<!doctype html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Downloads | PortalsBase</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css">
    <style>
        /* Theme variables with class-based dark mode support */
        :root {
            /* Light theme defaults */
            --bg-deep: #ffffff;
            --panel: rgba(2, 6, 23, 0.04);
            --panel-border: rgba(2, 6, 23, 0.06);
            --accent: #14b8a6;
            --accent-strong: #0d9488;
            --accent-glow: rgba(20, 184, 166, 0.08);
            --text-color: #0b1220;
        }

        /* Dark theme overrides when `.dark` is present on the root element */
        .dark {
            --bg-deep: #0b0f1c;
            --panel: rgba(255, 255, 255, 0.05);
            --panel-border: rgba(255, 255, 255, 0.08);
            --accent: #14b8a6;
            --accent-strong: #0d9488;
            --accent-glow: rgba(20, 184, 166, 0.35);
            --text-color: #eef2ff;
        }

        body {
            font-family: 'Space Grotesk', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-color);
            min-height: 100vh;
        }

        .bg-atmosphere {
            position: fixed;
            inset: 0;
            z-index: -1;
            background:
                radial-gradient(circle at 12% 18%, rgba(20, 184, 166, 0.18) 0%, transparent 50%),
                radial-gradient(circle at 80% 72%, rgba(245, 158, 11, 0.16) 0%, transparent 52%),
                linear-gradient(180deg, rgba(15, 23, 42, 0.8) 0%, rgba(2, 6, 23, 0.9) 100%);
        }

        .portal-gradient-text {
            background: linear-gradient(90deg, #14b8a6 0%, #38bdf8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: inline-block;
        }

        .glass-card {
            background: var(--panel);
            border: 1px solid var(--panel-border);
            border-radius: 24px;
            transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .glass-card:hover {
            transform: translateY(-8px);
            border-color: rgba(20, 184, 166, 0.4);
            box-shadow: 0 20px 50px rgba(2, 6, 23, 0.45);
        }

        .search-input {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 9999px;
        }

        .search-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(20, 184, 166, 0.15);
            outline: none;
        }

        .btn-download {
            background: rgba(15, 23, 42, 0.65);
            border: 1px solid rgba(148, 163, 184, 0.3);
            transition: transform 0.25s ease, background 0.25s ease, box-shadow 0.25s ease;
        }

        .btn-download:hover {
            background: var(--accent);
            border-color: transparent;
            transform: translateY(-2px);
            box-shadow: 0 14px 24px var(--accent-glow);
        }

        .navbar-main {
            background: rgba(2, 6, 23, 0.7);
            border-bottom: 1px solid rgba(148, 163, 184, 0.15);
            backdrop-filter: blur(16px);
        }

        .tag-pill {
            border: 1px solid rgba(20, 184, 166, 0.35);
            color: #99f6e4;
            background: rgba(20, 184, 166, 0.08);
        }

        .toast {
            background: #e2e8f0;
            color: #0f172a;
        }
    </style>
</head>
<body class="text-slate-100">
    <div class="bg-atmosphere"></div>

    <header class="sticky top-0 z-40 navbar-main">
        <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
            <a href="/" class="text-2xl font-semibold tracking-tight">Portals<span class="portal-gradient-text">Base</span></a>
            <div class="flex items-center gap-3">
                <button class="p-2 rounded-full hover:bg-slate-800/60 transition-colors text-slate-300" onclick="toggleDarkMode()" aria-label="Toggle color mode">
                    <svg class="w-5 h-5 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                    <svg class="w-5 h-5 block dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
                </button>
                <a href="/" class="px-4 py-2 rounded-full bg-emerald-500/90 hover:bg-emerald-400 text-slate-900 text-sm font-semibold transition-colors">Back to Home</a>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-6 pt-20 pb-24">
        <section class="text-center">
            <p class="uppercase tracking-[0.4em] text-xs text-emerald-200/70">Download center</p>
            <h1 class="mt-4 text-4xl md:text-6xl font-semibold leading-tight">
                PortalsBase <span class="portal-gradient-text">Downloads</span>
            </h1>
            <p class="mt-5 text-slate-300 max-w-2xl mx-auto">
                Grab official tools, desktop clients, and verified resources. Every file is signed and reviewed by the PortalsBase team.
            </p>
        </section>

        <section class="mt-12">
            <div id="downloadGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </section>
    </main>

    <footer class="py-10 border-t border-slate-800/70">
        <div class="max-w-6xl mx-auto px-6 flex flex-col md:flex-row items-center justify-between gap-4 text-sm text-slate-500">
            <div class="font-semibold text-slate-300">Portals<span class="portal-gradient-text">Base</span></div>
            <div>Copyright PortalsBase 2026 to 2027</div>
        </div>
    </footer>

    <div id="toast" class="toast fixed bottom-8 left-1/2 -translate-x-1/2 px-6 py-4 rounded-2xl font-semibold shadow-2xl translate-y-24 opacity-0 pointer-events-none transition-all duration-500 flex items-center gap-3">
        <span class="w-2 h-2 rounded-full bg-emerald-500 animate-ping"></span>
        <span id="toastMsg">Action completed</span>
    </div>

    <script>
        const downloadItems = [
            {
                id: 1,
                name: 'Audio App',
                cat: 'APP',
                        size: '62.9MB',
                        beta: true,
                icon: '<svg viewBox="0 0 24 24" class="w-12 h-12" fill="none" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 18V5l9-2v13"/><path stroke-linecap="round" stroke-linejoin="round" d="M6 17a2 2 0 100 4 2 2 0 000-4z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 15a2 2 0 100 4 2 2 0 000-4z"/></svg>',
                desc: 'An audio mixer that works with our audio controller device.',
                url: '/apps/Audio-app.zip'
            }
        ];

        function showNotification(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMsg').textContent = msg;
            toast.classList.remove('translate-y-24', 'opacity-0');
            setTimeout(() => {
                toast.classList.add('translate-y-24', 'opacity-0');
            }, 2800);
        }

        function render() {
            const grid = document.getElementById('downloadGrid');

            grid.innerHTML = downloadItems.map((item) => `
                <div class="glass-card p-8 flex flex-col justify-between">
                    <div>
                        <div class="flex items-center justify-between">
                            <div class="text-emerald-200">${item.icon}</div>
                            <span class="tag-pill px-3 py-1 text-[11px] uppercase tracking-[0.2em] rounded-full">${item.cat}</span>
                        </div>
                        <h3 class="mt-6 text-2xl font-semibold text-slate-50">${item.name}</h3>
                        <p class="mt-3 text-sm text-slate-400 leading-relaxed">${item.desc}</p>
                        ${item.beta ? '<div class="mt-3"><span class="beta-badge beta-badge--emerald">Beta</span></div>' : ''}
                    </div>
                    <div class="mt-8">
                        <div class="flex items-center justify-between text-xs uppercase tracking-[0.3em] text-slate-500">
                            <span>Size <span class="text-slate-200">${item.size}</span></span>
                            <span>Verified</span>
                        </div>
                        <a class="btn-download w-full mt-5 py-3 rounded-2xl text-sm font-semibold inline-flex items-center justify-center" href="${item.url}" download onclick="showNotification('Preparing ${item.name} download...')">
                            Download File
                        </a>
                    </div>
                </div>
            `).join('');
        }

        window.onload = () => render();
    </script>

    <script src="/static/main.js"></script>
</body>
</html>
